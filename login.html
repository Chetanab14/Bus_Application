<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Bus Express</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Google Fonts Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Header / Navbar -->
  <nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-bus-front"></i> Bus Express
      </a>
      <button class="theme-toggle-btn ms-auto" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <i class="bi bi-moon-fill"></i>
      </button>
    </div>
  </nav>

  <!-- Main Login Card Area -->
  <main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card card-custom p-4">
            <div class="text-center mb-4">
              <div
                class="d-inline-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger rounded-circle p-3 mb-3">
                <i class="bi bi-person-lock fs-2"></i>
              </div>
              <h2 class="fw-bold">Welcome Back</h2>
              <p class="text-muted small">Sign in to book and manage your tickets</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLoginSubmit(event)" novalidate>
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email or Username</label>
                <div class="search-input-group">
                  <i class="bi bi-envelope"></i>
                  <input type="text" class="form-control form-control-custom" id="email" placeholder="Email or Username"
                    required>
                </div>
                <div class="invalid-feedback">Please enter a valid email or username.</div>
              </div>

              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <label for="password" class="form-label fw-semibold mb-0">Password</label>
                  <a href="#" class="text-danger text-decoration-none small"
                    onclick="handleForgotPassword(event)">Forgot Password?</a>
                </div>
                <div class="search-input-group">
                  <i class="bi bi-shield-lock"></i>
                  <input type="password" class="form-control form-control-custom" id="password"
                    placeholder="Enter password" required>
                </div>
                <div class="invalid-feedback">Password is required.</div>
              </div>

              <div class="mb-3 form-check d-flex justify-content-between align-items-center">
                <div>
                  <input type="checkbox" class="form-check-input" id="showPassword"
                    onclick="togglePasswordVisibility()">
                  <label class="form-check-label text-muted small" for="showPassword">Show Password</label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 btn-lg btn-primary rounded-8 shadow-sm">
                Login <i class="bi bi-box-arrow-in-right ms-1"></i>
              </button>
            </form>

            <div class="text-center mt-4">
              <p class="text-muted small mb-0">New User? <a href="register.html"
                  class="text-danger fw-bold text-decoration-none">Register Here</a></p>
            </div>

            <div class="text-center mt-3 border-top pt-3">
              <p class="text-muted small mb-0">Admin credentials preset: <br><code>admin / admin123</code></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="custom-footer mt-auto">
    <div class="container text-center">
      <p class="mb-0 text-muted">&copy; 2026 Bus Express. All rights reserved. Inspired by RedBus.</p>
    </div>
  </footer>

  <!-- API and Business Logic JS -->
  <script src="js/api.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
