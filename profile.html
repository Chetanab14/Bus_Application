<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Bus Express</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Header / Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="home.html">
                <i class="bi bi-bus-front"></i> Bus Express
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
                aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html"><i class="bi bi-house-door me-1"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mybookings.html"><i class="bi bi-ticket-perforated me-1"></i>My
                            Bookings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="profile.html"><i
                                class="bi bi-person-circle me-1"></i>Profile</a>
                    </li>
                    <li class="nav-item" id="admin-nav-item" style="display: none;">
                        <a class="nav-link text-danger" href="admin.html"><i class="bi bi-speedometer2 me-1"></i>Admin
                            Dashboard</a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <button class="btn btn-outline-danger btn-sm" onclick="logoutUser()">Logout <i
                                class="bi bi-box-arrow-right"></i></button>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()"
                            aria-label="Toggle Theme">
                            <i class="bi bi-moon-fill"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Profile sheet grid -->
    <main class="container my-5 py-3 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card card-custom p-4 shadow-sm border-0">
                    <div class="text-center pb-3 border-bottom mb-4">
                        <!-- Profile avatar photo placeholder initials -->
                        <div class="avatar-placeholder" id="userInitials">PE</div>
                        <h3 class="fw-bold mb-1" id="profileName">Passenger Name</h3>
                        <p class="text-muted small" id="profileEmail">passenger@gmail.com</p>
                    </div>

                    <!-- Fields -->
                    <form id="profileForm" novalidate onsubmit="event.preventDefault()">
                        <div class="mb-3">
                            <label for="profName" class="form-label fw-semibold">Full Name</label>
                            <div class="search-input-group">
                                <i class="bi bi-person text-danger"></i>
                                <input type="text" class="form-control form-control-custom" id="profName" required
                                    disabled>
                            </div>
                            <div class="invalid-feedback">Name cannot be empty.</div>
                        </div>

                        <div class="mb-3">
                            <label for="profEmail" class="form-label fw-semibold">Email address</label>
                            <div class="search-input-group">
                                <i class="bi bi-envelope text-danger"></i>
                                <input type="email" class="form-control form-control-custom" id="profEmail" required
                                    disabled>
                            </div>
                            <div class="invalid-feedback">Please enter a valid email.</div>
                        </div>

                        <div class="mb-4">
                            <label for="profPhone" class="form-label fw-semibold">Mobile Number</label>
                            <div class="search-input-group">
                                <i class="bi bi-telephone text-danger"></i>
                                <input type="tel" class="form-control form-control-custom" id="profPhone"
                                    pattern="[6-9][0-9]{9}" required disabled>
                            </div>
                            <div class="invalid-feedback">Enter a valid 10-digit number.</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-outline-danger flex-grow-1" id="btnEditProfile"
                                onclick="toggleEditMode()">
                                <i class="bi bi-pencil-square me-1"></i> Edit Profile
                            </button>
                            <button type="button" class="btn btn-success flex-grow-1" id="btnSaveProfile"
                                onclick="saveProfileChanges()" style="display: none;">
                                <i class="bi bi-check-circle me-1"></i> Save Changes
                            </button>
                            <button type="button" class="btn btn-secondary" id="btnCancelEdit"
                                onclick="cancelEditMode()" style="display: none;">
                                Cancel
                            </button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="d-grid gap-2">
                        <button class="btn btn-light border py-2 text-danger fw-bold" onclick="logoutUser()">
                            <i class="bi bi-box-arrow-left me-2"></i> Log Out of Session
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- Sticky Footer -->
    <footer class="custom-footer mt-auto">
        <div class="container text-center">
            <p class="mb-0 text-muted">&copy; 2026 Bus Express Booking System. All rights reserved.</p>
        </div>
    </footer>

    <!-- Poppers and API modules -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
